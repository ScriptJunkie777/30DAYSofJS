<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLAYAROUND</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Update CSS Variable with JS</h1>
  <div class="controls">
    <label for="spacing">Spacing:</label>
    <input type="range" name="spacing" min="10" max="200" vqalue="10" data-sizing="px">

    <label for="blur">Blur:</label>
    <input type="range" name="blur" min="10" max="200" value="10" data-sizing="px">

    <label for="base">Base Color:</label>
    <input type="color" namebase" value="#ffc600">


  </div>
  <img class="image" src="image.png" alt="image">
</body>
</html>
